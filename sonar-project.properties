sonar.projectKey=cdap
sonar.projectName=CDAP

sonar.sources=terraform/services,scripts,actions,terraform/modules

sonar.exclusions=\
  **/__pycache__/**,\
  **/*.pyc,\
  **/.terraform/**,\
  **/node_modules/**,\
  **/dist/**,\
  **/vendor/**,\
  **/*.tfstate,\
  **/*.tfstate.backup

# Python settings
sonar.python.version=3.12

# Test file exclusions
sonar.test.exclusions=**/tests/**,**/*_test.go,**/*.test.js
