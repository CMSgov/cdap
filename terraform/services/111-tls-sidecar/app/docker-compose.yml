version: "3.9"

services:

  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8443:8443"
    environment:
      UPSTREAM_URL: "http://upstream:8080"
      LISTEN_PORT: "8443"
    depends_on:
      - upstream

  upstream:
    image: hashicorp/http-echo
    command: ["-text=hello from upstream", "-listen=:8080"]
    ports:
      - "8080:8080"
