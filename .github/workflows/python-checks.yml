name: python-checks

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'terraform/services/**/lambda_src/**'
      - 'scripts/**/*.py'

env:
  PYTHON_VERSION: '3.12'

jobs:
  python-checks:
    runs-on: codebuild-cdap-${{ github.ref_name == 'main' && 'prod' || 'non-prod' }}-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.3.0
        with:
          fetch-depth: 0  # Required for both SonarQube blame data and git diff

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Snyk
        uses: snyk/actions/setup@master

      - name: Assume role to AWS
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: arn:aws:iam::${{ github.ref_name =='main' && secrets.PROD_ACCOUNT || secrets.NON_PROD_ACCOUNT }}:role/delegatedadmin/developer/${{ github.ref_name =='main' && 'cdap-prod' || 'cdap-test' }}-github-actions
          aws-region: ${{ vars.AWS_REGION }}

      - name: Retrieve Sonarqube credentials
        uses: ./actions/aws-params-env-action
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        with:
          params: |
            SNYK_TOKEN=/cdap/snyk/token
            SONAR_HOST_URL=/sonarqube/url
            SONAR_TOKEN=/sonarqube/token

      - name: Run Python Checks (SonarQube + Snyk)
        env:
          SNYK_TOKEN: ${{ env.SNYK_TOKEN }}
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
        run: scripts/python-checks
