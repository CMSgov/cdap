name: python-checks

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'terraform/services/alarm-to-slack/lambda_src/**'

jobs:
  python-checks:
    runs-on: codebuild-cdap-${{ github.ref_name =='main' && 'prod' || 'non-prod' }}-${{github.run_id}}-${{github.run_attempt}}
    steps:
      - uses: actions/checkout@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      - uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v 47.0.5
        id: changed-dirs
        with:
          files: |
            terraform/services/alarm-to-slack/lambda_src/**
          dir_names: 'true'
      - run: scripts/python-checks
        env:
          CHANGED_DIRS: ${{ steps.changed-dirs.outputs.all_changed_files }}
