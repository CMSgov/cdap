name: tofu-fmt

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'terraform/**'

env:
  TENV_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

defaults:
  run:
    working-directory: ./terraform

jobs:
  check:
    runs-on: codebuild-cdap-${{ github.ref_name =='main' && 'prod' || 'non-prod' }}${{github.run_id}}-${{github.run_attempt}}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159  # v3.9.2
      - uses: cmsgov/cdap/actions/setup-tenv@6840aaf487bf0dd5a83832c3434b140fb525d886
      - run: tofu fmt -check -diff -recursive .
