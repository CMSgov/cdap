name: code-checks (reusable)
description: Workflow that can be called to evaluate any script or folder containing python logic. Used in tandem with built-in Snyk integration.

on:
  workflow_call:
    inputs:
      source_path:
        description: 'Path to Python or JavaScript source directory (optional)'
        required: true
        type: string
      node_version:
        description: 'Node.js version (if source is JavaScript and requires npm install)'
        required: false
        type: string
        default: ''
      sonar_project_key:
        description: 'SonarQube project key'
        required: true
        type: string
      sonar_extra_args:
        description: 'Additional sonar-scanner -D args (optional)'
        required: false
        type: string
        default: ''
      dockerfile:
        description: 'Path to Dockerfile'
        required: false
        type: string
        default: ''
      docker_context:
        description: 'Docker build context path'
        required: false
        type: string
        default: ''
      docker_image_tag:
        description: 'Tag for the built Docker image'
        required: false
        type: string
        default: ''
      service_name:
        description: 'Service name — used for DD_SERVICE and image tag'
        required: false
        type: string
        default: ''
      environment:
        description: 'Environment — used for DD_ENV'
        required: false
        type: string
        default: ''
      test_command:
        description: 'Test command to run inside the Docker image'
        required: false
        type: string
        default: ''

jobs:
  checks:
    permissions:
      contents: read
      id-token: write
    runs-on: codebuild-cdap-${{ github.ref_name == 'main' && 'prod' || 'non-prod' }}-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.3.0
        with:
          fetch-depth: 0

      - name: Assume role to AWS
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v4.1.0
        with:
          role-to-assume: arn:aws:iam::${{ github.ref_name == 'main' && secrets.PROD_ACCOUNT || secrets.NON_PROD_ACCOUNT }}:role/delegatedadmin/developer/${{ github.ref_name == 'main' && 'cdap-prod' || 'cdap-test' }}-github-actions
          aws-region: ${{ vars.AWS_REGION }}

      - name: Build Image
        if: inputs.dockerfile != ''
        run: |
          docker build \
            -t ${{ inputs.service_name }}:${{ inputs.docker_image_tag }} \
            -f ${{ inputs.dockerfile }} \
            ${{ inputs.docker_context }}

      # ← New: Run tests with coverage if test_command provided
      - name: Run Tests and Generate Coverage
        if: inputs.test_command != '' && inputs.dockerfile != ''
        run: |
          SHORT_SHA=$(echo "${{ inputs.docker_image_tag }}" | cut -c1-7)
          mkdir -p /tmp/coverage

          docker run --rm \
            -v /tmp/coverage:/app/coverage \
            -e DD_SERVICE=${{ inputs.service_name }} \
            -e DD_ENV=${{ inputs.environment }} \
            -e DD_VERSION=$SHORT_SHA \
            ${{ inputs.service_name }}:${{ inputs.docker_image_tag }} \
            ${{ inputs.test_command }}

          cp /tmp/coverage/coverage.xml ${{ inputs.source_path }}/coverage.xml

      - name: Retrieve credentials
        uses: ./actions/aws-params-env-action
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        with:
          params: |
            SONAR_HOST_URL=/sonarqube/url
            SONAR_TOKEN=/sonarqube/token

      - name: Setup node for Sonarqube analysis of compiled typescript
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ inputs.node_version }}

      - name: Install Node dependencies
        if: inputs.node_version != ''
        working-directory: ${{ inputs.source_path }}
        run: npm ci

      - name: Run SonarQube Scan
        if: inputs.source_path != '' && inputs.sonar_project_key != ''
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
        with:
          projectBaseDir: ${{ inputs.source_path }}
          args: >
            -Dsonar.projectKey=${{ inputs.sonar_project_key }}
            -Dsonar.projectName=${{ inputs.sonar_project_key }}
            -Dsonar.sources=.
            -Dsonar.ci.autoconfig.disabled=true
            -Dsonar.exclusions=**/__pycache__/**,**/*.pyc,**/.terraform/**,**/node_modules/**,**/dist/**,**/lib/**,**/requirements.in

      - name: SonarQube Quality Gate Check
        if: inputs.source_path != '' && inputs.sonar_project_key != ''
        uses: sonarsource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0
        timeout-minutes: 5
        with:
          scanMetadataReportFile: ${{ inputs.source_path }}/.scannerwork/report-task.txt
