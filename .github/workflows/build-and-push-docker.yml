name: Service Images — Build, Test, and Push

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/services/**/app/**'
  pull_request:
    branches:
      - main
    paths:
      - 'terraform/services/**/app/**'
  workflow_dispatch:
    inputs:
      app:
        description: 'App name (cdap, ab2d, bcda, dpc)'
        required: false
        type: choice
        options: [cdap, ab2d, bcda, dpc]
        default: cdap
      service:
        description: 'Service name (must match a directory under terraform/services/)'
        required: true
        type: string
      environment:
        description: 'Environment to push to'
        required: true
        type: choice
        options: [dev, test, sandbox, prod]

concurrency:
  group: build-${{ github.ref }}-${{ inputs.service || 'auto' }}
  cancel-in-progress: false

env:
  TENV_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: codebuild-${{ inputs.app || 'cdap' }}-non-prod-${{ github.run_id }}-${{ github.run_attempt }}
    permissions:
      contents: read
    outputs:
      matrix:       ${{ steps.detect.outputs.matrix }}
      push_matrix:  ${{ steps.detect.outputs.push_matrix }}
      any_changed:  ${{ steps.detect.outputs.any_changed }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.3.0
        with:
          fetch-depth: 0

      - uses: cmsgov/cdap/actions/setup-yq@f4c14d47cc20e7f6de9112d7155af1213c9bca5a

      - name: Detect changed services and build matrix
        id: detect
        env:
          EVENT_NAME:   ${{ github.event_name }}
          INPUT_APP:    ${{ inputs.app || 'cdap' }}
          INPUT_SERVICE: ${{ inputs.service }}
          INPUT_ENV:    ${{ inputs.environment }}
          BASE_SHA:     ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA:     ${{ github.sha }}
        run: |
          # ── helpers ────────────────────────────────────────────────────────

          strip_prefix()     { echo "$1" | sed 's/^[0-9]*-//'; }
          is_image_enabled() { yq '.image.enabled // true' "$1"; }

          skip() {
            echo "any_changed=false" >> "$GITHUB_OUTPUT"
            echo "matrix=[]"        >> "$GITHUB_OUTPUT"
            echo "push_matrix=[]"   >> "$GITHUB_OUTPUT"
            exit 0
          }

          build_entry() {
            local svc="$1" env="$2" test_cmd="$3"
            local svc_name account
            svc_name=$(strip_prefix "$svc")
            [[ "$env" == "prod" || "$env" == "sandbox" ]] && account="prod" || account="non-prod"
            jq -cn \
              --arg svc      "$svc"                \
              --arg svc_name "$svc_name"           \
              --arg env      "$env"                \
              --arg test_cmd "$test_cmd"           \
              --arg app      "${INPUT_APP:-cdap}"  \
              --arg account  "$account"            \
              '{service: $svc, service_name: $svc_name, environment: $env,
                test_command: $test_cmd, app: $app, account: $account}'
          }

          add_entry() {
            local svc="$1" env="$2"
            local cfg="terraform/services/$svc/config/${env}.yml"
            [ ! -f "$cfg" ] && return
            [ "$(is_image_enabled "$cfg")" != "true" ] && {
              echo "$svc ($env): image.enabled is false — skipping"; return
            }
            local test_cmd
            test_cmd=$(yq '.image.test_command // "echo \"no tests defined\""' "$cfg")
            ENTRIES=$(echo "$ENTRIES" | jq -c --argjson e "$(build_entry "$svc" "$env" "$test_cmd")" '. + [$e]')
          }

          # ── main logic ─────────────────────────────────────────────────────

          ENTRIES="[]"

          if [ "$EVENT_NAME" == "workflow_dispatch" ]; then
            SVC_DIR="terraform/services/$INPUT_SERVICE"
            [ ! -f "$SVC_DIR/app/Dockerfile" ] && {
              echo "No Dockerfile at $SVC_DIR/app/Dockerfile — skipping"; skip
            }
            add_entry "$INPUT_SERVICE" "$INPUT_ENV"

          else
            if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" == "0000000000000000000000000000000000000000" ]; then
              BASE_SHA=$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)
            fi
            CHANGED_SERVICES=$(
              git diff --name-only "$BASE_SHA" "$HEAD_SHA" \
                | grep '^terraform/services/[^/]*/app/' \
                | sed 's|terraform/services/\([^/]*\)/app/.*|\1|' \
                | sort -u
            )
            echo "Services with changed app/ files: $CHANGED_SERVICES"

            for SVC in $CHANGED_SERVICES; do
              [ ! -f "terraform/services/$SVC/app/Dockerfile" ] && {
                echo "$SVC: no Dockerfile — skipping"; continue
              }

              if [ "$EVENT_NAME" == "pull_request" ]; then
                add_entry "$SVC" "test"
              else
                for ENV in dev test sandbox prod; do
                  add_entry "$SVC" "$ENV"
                done
              fi
            done
          fi

          # ── emit outputs ───────────────────────────────────────────────────

          echo "Matrix: $ENTRIES"

          if [ "$ENTRIES" == "[]" ] || [ -z "$ENTRIES" ]; then
            skip
          fi

          PUSH_MATRIX=$(echo "$ENTRIES" | jq -c '
            group_by(.account) | map(.[0]) |
            map({service, service_name, app, account, test_command})
          ')

          echo "any_changed=true"        >> "$GITHUB_OUTPUT"
          echo "matrix=$ENTRIES"         >> "$GITHUB_OUTPUT"
          echo "push_matrix=$PUSH_MATRIX" >> "$GITHUB_OUTPUT"

  code-checks:
    name: Code Checks — ${{ matrix.service }}
    needs: [detect-changes]
    if: needs.detect-changes.outputs.any_changed == 'true'
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.push_matrix) }}
    uses: ./.github/workflows/checks-reusable.yml
    secrets: inherit
    with:
      source_path:       terraform/services/${{ matrix.service }}/app
      sonar_project_key: ${{ matrix.app }}-${{ matrix.service_name }}
      docker_image_tag:  ${{ github.sha }}
      docker_context:    terraform/services/${{ matrix.service }}/app
      dockerfile:        terraform/services/${{ matrix.service }}/app/Dockerfile
      service_name:      ${{ matrix.service_name }}
      environment:       ${{ matrix.environment }}
      test_command:      ${{ matrix.test_command }}

  push-to-ecr:
    name: Push to ECR — ${{ matrix.service }} (${{ matrix.account }})
    needs: [detect-changes, code-checks]
    if: |
      needs.detect-changes.outputs.any_changed == 'true' &&
      (github.event_name == 'workflow_dispatch' || github.ref_name == 'main')
    permissions:
      id-token: write
      contents: read
    runs-on: codebuild-${{ matrix.app }}-${{ matrix.account }}-${{ github.run_id }}-${{ github.run_attempt }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.push_matrix) }}
    outputs:
      image_tag: ${{ steps.build-push.outputs.image_tag }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.3.0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: >-
            arn:aws:iam::${{
              matrix.account == 'prod'
                && secrets.PROD_ACCOUNT
                || secrets.NON_PROD_ACCOUNT
            }}:role/delegatedadmin/developer/${{ matrix.app }}-${{ matrix.account }}-github-actions
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@29a98d5d1b455a4ce13a4d34088241cad71d74df

      - name: Build, Tag, and Push Image
        id: build-push
        env:
          ECR_REGISTRY:   ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ matrix.app }}-${{ matrix.service_name }}
          IMAGE_TAG:      ${{ github.sha }}
        run: |
          IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          APP_DIR="terraform/services/${{ matrix.service }}/app"

          docker build -t "$IMAGE" -f "$APP_DIR/Dockerfile" "$APP_DIR"
          docker push "$IMAGE"

          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE"         >> "$GITHUB_OUTPUT"

      - name: Confirm Pushed Image
        run: |
          echo "✅ Successfully pushed ${{ steps.build-push.outputs.image }} to ${{ matrix.account }} account"
          echo ""
          echo "To deploy this image, run ecs-service-deploy.yml with:"
          echo "  app:          ${{ matrix.app }}"
          echo "  service_name: ${{ matrix.service_name }}"
          echo "  image_tag:    ${{ github.sha }}"
          echo "  environment:  <your target environment>"
