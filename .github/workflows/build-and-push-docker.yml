name: Service Images — Build, Test, and Push

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/services/**/app/**'
      - '.github/workflows/build-and-push-docker.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'terraform/services/**/app/**'
      - '.github/workflows/build-and-push-docker.yml'
  workflow_dispatch:
    inputs:
      service:
        description: 'Service name (must match a directory under terraform/services/)'
        required: true
        type: string
      environment:
        description: 'Environment to push to'
        required: true
        type: choice
        options:
          - test
          - prod
          - both

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: codebuild-cdap-non-prod-${{ github.run_id }}-${{ github.run_attempt }}
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      any_changed: ${{ steps.detect.outputs.any_changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.3.0
        with:
          fetch-depth: 0
      - uses: cmsgov/cdap/actions/setup-yq@f4c14d47cc20e7f6de9112d7155af1213c9bca5a
      - name: Detect changed services and build matrix
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_SERVICE: ${{ inputs.service }}
          INPUT_ENV: ${{ inputs.environment }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          strip_prefix() {
            echo "$1" | sed 's/^[0-9]*-//'
          }
          
          build_entry() {
            local svc="$1"
            local env="$2"
            local test_cmd="$3"
            local svc_name
            svc_name=$(strip_prefix "$svc")
            jq -cn \
            --arg svc "$svc" \
            --arg svc_name "$svc_name" \
            --arg env "$env" \
            --arg test_cmd "$test_cmd" \
            '{service: $svc, service_name: $svc_name, environment: $env, test_command: $test_cmd}'
          }
          
          is_image_enabled() {
            local config_file="$1"
            yq '.image.enabled // true' "$config_file"
          }

          ENTRIES="[]"

          if [ "$EVENT_NAME" == "workflow_dispatch" ]; then
            SERVICE="$INPUT_SERVICE"
            SERVICE_DIR="terraform/services/$SERVICE"

            if [ ! -f "$SERVICE_DIR/app/Dockerfile" ]; then
              echo "No Dockerfile found at $SERVICE_DIR/app/Dockerfile — skipping"
              echo "any_changed=false" >> $GITHUB_OUTPUT
              echo "matrix=[]" >> $GITHUB_OUTPUT
              exit 0
            fi

            if [ "$INPUT_ENV" == "both" ]; then
              ENVS="test prod"
            else
              ENVS="$INPUT_ENV"
            fi

            for ENV in $ENVS; do
              CONFIG_FILE="$SERVICE_DIR/config/${ENV}.yml"
              if [ ! -f "$CONFIG_FILE" ]; then
                echo "No config/${ENV}.yml for $SERVICE — skipping $ENV"
                continue
              fi
              if [ "$(is_image_enabled "$CONFIG_FILE")" != "true" ]; then
                echo "$SERVICE ($ENV): image.enabled is false — skipping"
                continue
              fi
              TEST_CMD=$(yq '.image.test_command // "echo \"no tests defined\""' "$CONFIG_FILE")
              ENTRY=$(build_entry "$SERVICE" "$ENV" "$TEST_CMD")
              ENTRIES=$(echo "$ENTRIES" | jq -c --argjson e "$ENTRY" '. + [$e]')
            done

          else
            CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")

            CHANGED_SERVICES=$(echo "$CHANGED_FILES" \
              | grep '^terraform/services/[^/]*/app/' \
              | sed 's|terraform/services/\([^/]*\)/app/.*|\1|' \
              | sort -u)

            echo "Services with changed app/ files: $CHANGED_SERVICES"

            for SERVICE in $CHANGED_SERVICES; do
              SERVICE_DIR="terraform/services/$SERVICE"

              if [ ! -f "$SERVICE_DIR/app/Dockerfile" ]; then
                echo "$SERVICE: no Dockerfile — skipping"
                continue
              fi

              if [ "$EVENT_NAME" == "pull_request" ]; then
                # PRs always build test/non-prod only — this is the single enforcement point
                CONFIG_FILE="$SERVICE_DIR/config/test.yml"
                if [ ! -f "$CONFIG_FILE" ]; then
                  echo "$SERVICE: no config/test.yml — skipping"
                  continue
                fi
                if [ "$(is_image_enabled "$CONFIG_FILE")" != "true" ]; then
                  echo "$SERVICE (test): image.enabled is false — skipping"
                  continue
                fi
                TEST_CMD=$(yq '.image.test_command // "echo \"no tests defined\""' "$CONFIG_FILE")
                ENTRY=$(build_entry "$SERVICE" "test" "$TEST_CMD")
                ENTRIES=$(echo "$ENTRIES" | jq -c --argjson e "$ENTRY" '. + [$e]')

              else
                # Push to main — fan out to all configured envs
                for ENV in test prod; do
                  CONFIG_FILE="$SERVICE_DIR/config/${ENV}.yml"
                  if [ ! -f "$CONFIG_FILE" ]; then
                    continue
                  fi
                  if [ "$(is_image_enabled "$CONFIG_FILE")" != "true" ]; then
                    echo "$SERVICE ($ENV): image.enabled is false — skipping"
                    continue
                  fi
                  TEST_CMD=$(yq '.image.test_command // "echo \"no tests defined\""' "$CONFIG_FILE")
                  ENTRY=$(build_entry "$SERVICE" "$ENV" "$TEST_CMD")
                  ENTRIES=$(echo "$ENTRIES" | jq -c --argjson e "$ENTRY" '. + [$e]')
                done
              fi
            done
          fi

          echo "Matrix: $ENTRIES"

          if [ "$ENTRIES" == "[]" ] || [ -z "$ENTRIES" ]; then
            echo "any_changed=false" >> $GITHUB_OUTPUT
            echo "matrix=[]" >> $GITHUB_OUTPUT
          else
            echo "any_changed=true" >> $GITHUB_OUTPUT
            echo "matrix=$ENTRIES" >> $GITHUB_OUTPUT
          fi

