  push-to-ecr:
    name: Push to ECR — ${{ matrix.service }} (${{ matrix.environment }})
    runs-on: codebuild-cdap-${{ matrix.environment == 'prod' && 'prod' || 'non-prod' }}-${{ github.run_id }}-${{ github.run_attempt }}
    needs: [detect-changes]
    if: |
      needs.detect-changes.outputs.any_changed == 'true' &&
      (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref_name == 'main'))
    permissions:
      id-token: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.3.0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: arn:aws:iam::${{ matrix.environment == 'prod' && secrets.PROD_ACCOUNT || secrets.NON_PROD_ACCOUNT }}:role/delegatedadmin/developer/cdap-${{ matrix.environment }}-github-actions
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@29a98d5d1b455a4ce13a4d34088241cad71d74df

      - name: Build, Tag, and Push Image
        id: build-push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: cdap-${{ matrix.environment }}-${{ matrix.service_name }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -f terraform/services/${{ matrix.service }}/app/Dockerfile \
            terraform/services/${{ matrix.service }}/app/

          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Confirm Pushed Image
        run: |
          echo "Successfully pushed ${{ steps.build-push.outputs.image }} to cdap-${{ matrix.environment }}"

      - name: Store image tag in SSM
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          aws ssm put-parameter \
            --name "/cdap/${{ matrix.environment }}/services/${{ matrix.service_name }}/image_tag" \
            --value "${{ github.sha }}" \
            --type String \
            --overwrite
          
          aws ssm put-parameter \
            --name "/cdap/${{ matrix.environment }}/services/${{ matrix.service_name }}/image_version" \
            --value "$SHORT_SHA" \
            --type String \
            --overwrite
